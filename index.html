<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple interactive dashboard for beginners." />
    <title>News Dashboard — Home</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      // Setting our default font completely to Inter
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
      }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="bg-gray-50 text-gray-900 min-h-screen font-sans">

    <nav class="sticky top-0 z-50 flex items-center justify-between h-16 px-4 md:px-8 bg-white border-b border-gray-200 shadow-sm">

      <span class="text-xl font-extrabold text-blue-600">
        <i class="fa-regular fa-newspaper"></i> NewsDash
      </span>

      <button class="block md:hidden text-2xl text-gray-600" onclick="document.getElementById('nav-menu').classList.toggle('hidden')">
        ☰
      </button>

      <ul id="nav-menu" class="hidden md:flex gap-2 list-none m-0 p-0 items-center">
        <li>

          <a href="index.html" class="block px-4 py-2 rounded border border-transparent bg-blue-600 text-white font-medium hover:bg-blue-700 transition">
            <i class="fa-solid fa-house"></i> Home
          </a>
        </li>
        <li>
          <a href="matches.html" class="block px-4 py-2 rounded text-gray-600 font-medium hover:text-blue-600 hover:bg-blue-50 transition border border-transparent">
            <i class="fa-solid fa-futbol"></i> Matches
          </a>
        </li>
        <li>
          <a href="table.html" class="block px-4 py-2 rounded text-gray-600 font-medium hover:text-blue-600 hover:bg-blue-50 transition border border-transparent">
            <i class="fa-solid fa-table"></i> Table
          </a>
        </li>
        <li>
          <a href="stats.html" class="block px-4 py-2 rounded text-gray-600 font-medium hover:text-blue-600 hover:bg-blue-50 transition border border-transparent">
            <i class="fa-solid fa-trophy"></i> Stats
          </a>
        </li>
      </ul>
    </nav>

    <div class="grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-8 max-w-7xl mx-auto p-4 md:p-8 mt-2">

      <main>

        <div id="news-spinner" class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto my-8"></div>

        <div id="news-content"></div>
      </main>

      <aside class="flex flex-col gap-6">

        <div class="bg-white border border-gray-200 rounded-lg p-5 shadow-sm" id="weather-widget">
          <h3 class="text-xl font-bold mb-5 flex items-center gap-2 text-gray-800">
            <i class="fa-solid fa-cloud-sun text-yellow-500"></i> Weather
          </h3>
          <div id="weather-spinner" class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto my-8"></div>
          <div id="weather-content" style="display:none;"></div>
        </div>

        <div class="bg-white border border-gray-200 rounded-lg p-5 shadow-sm" id="exchange-widget">
          <h3 class="text-xl font-bold mb-5 flex items-center gap-2 text-gray-800">
            <i class="fa-solid fa-money-bill-transfer text-green-600"></i> Exchange Rates
          </h3>
          <div id="exchange-spinner" class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto my-8"></div>

          <div id="exchange-content" style="display:none;">

            <div id="rates-list" class="text-gray-700"></div>

            <div class="mt-4 pt-4 border-t border-gray-100">
              <h4 class="text-sm font-semibold mb-3 text-gray-500">Currency Converter</h4>

              <div class="flex gap-2 mb-2">

                <input type="number" id="conv-amount" placeholder="Amount" value="1" min="0" step="any"
                  class="flex-1 px-3 py-2 border border-gray-300 rounded text-gray-800 text-sm outline-none hover:border-blue-400 focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition" />

                <select id="conv-from" class="flex-1 px-3 py-2 border border-gray-300 rounded text-gray-800 text-sm outline-none hover:border-blue-400 focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition">
                  <option value="USD">USD</option>
                  <option value="SAR">SAR</option>
                  <option value="EGP">EGP</option>
                  <option value="EUR">EUR</option>
                  <option value="GBP">GBP</option>
                </select>
              </div>

              <div class="flex gap-2 mb-2">
                <select id="conv-to" class="flex-1 px-3 py-2 border border-gray-300 rounded text-gray-800 text-sm outline-none hover:border-blue-400 focus:border-blue-600 focus:ring-1 focus:ring-blue-600 transition w-full">
                  <option value="EGP">EGP</option>
                  <option value="USD">USD</option>
                  <option value="SAR">SAR</option>
                  <option value="EUR">EUR</option>
                  <option value="GBP">GBP</option>
                </select>
              </div>

              <div id="conv-result" class="text-xl font-bold text-blue-600 text-center mt-3">—</div>
            </div>
          </div>
        </div>

        <div class="bg-white border border-gray-200 rounded-lg p-5 shadow-sm" id="live-widget">
          <h3 class="text-xl font-bold mb-5 flex items-center gap-2 text-gray-800">
            <i class="fa-solid fa-circle text-red-600"></i> Live Matches
          </h3>
          <div id="live-spinner" class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto my-8"></div>
          <div id="live-content" style="display:none;" class="flex flex-col gap-2"></div>
        </div>

      </aside>
    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/news.js"></script>
    <script src="assets/js/weather.js"></script>
    <script src="assets/js/exchange.js"></script>
    <script src="assets/js/liveMatches.js"></script>

  </body>
</html>
