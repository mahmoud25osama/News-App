<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
      content="League Matches — View fixtures and results for the Big 5 European football leagues." />
    <title>News Dashboard — Matches</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
      }
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="bg-slate-900 text-slate-100 min-h-screen">

    <nav
      class="sticky top-0 z-50 flex items-center justify-between h-16 px-4 md:px-8 bg-slate-900/85 backdrop-blur-2xl border-b border-slate-600/40">
      <span class="text-xl font-extrabold text-blue-400"><i class="fa-regular fa-newspaper"></i> NewsDash</span>

      <button class="block md:hidden text-2xl"
        onclick="document.getElementById('nav-menu').classList.toggle('open')">☰</button>

      <ul id="nav-menu" class="hidden md:flex gap-1 list-none">
        <li><a href="index.html"
            class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800"><i
              class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="matches.html" class="px-4 py-2 rounded-lg bg-blue-500 text-white font-medium"><i
              class="fa-solid fa-futbol"></i> Matches</a></li>
        <li><a href="table.html"
            class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800"><i
              class="fa-solid fa-table"></i> Table</a></li>
        <li><a href="stats.html"
            class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800"><i
              class="fa-solid fa-trophy"></i> Stats</a></li>
      </ul>
    </nav>

    <div class="max-w-[1440px] mx-auto p-4 md:p-8">

      <h1 class="text-2xl font-bold mb-2 flex items-center gap-2">
        <span class="w-2 h-2 bg-blue-500 rounded-full inline-block"></span>
        <span id="page-title">League Matches</span>
      </h1>
      <p class="text-slate-400 text-sm mb-6">Browse fixtures &amp; results for this season's top European leagues.</p>

      <div class="flex gap-2 flex-wrap mb-6" id="league-tabs"></div>

      <div class="flex gap-4 flex-wrap mb-6 max-sm:flex-col">
        <input type="text" id="filter-team" placeholder="🔍 Filter by team name…"
          class="px-4 py-2.5 border border-slate-600 rounded-lg bg-slate-800 text-sm outline-none focus:border-blue-500 min-w-[200px] max-sm:min-w-full" />
        <input type="date" id="filter-date"
          class="px-4 py-2.5 border border-slate-600 rounded-lg bg-slate-800 text-sm outline-none focus:border-blue-500 min-w-[200px] max-sm:min-w-full" />
      </div>

      <div id="matches-spinner"
        class="w-10 h-10 border-[3px] border-slate-600 border-t-blue-500 rounded-full animate-spin mx-auto my-8"></div>

      <div id="matches-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
      </div>

    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/matches.js"></script>
  </body>

</html>
