<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Player Statistics — Top scorers, yellow cards, and red cards across Europe's top leagues." />
  <title>News Dashboard — Stats</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
    }
  </script>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="bg-slate-900 text-slate-100 min-h-screen">

  <!-- ========================================== -->
  <!-- Navigation Bar                             -->
  <!-- ========================================== -->
  <nav class="sticky top-0 z-50 flex items-center justify-between h-16 px-4 md:px-8 bg-slate-900/85 backdrop-blur-2xl border-b border-slate-600/40">
    <span class="text-xl font-extrabold text-blue-400">📰 NewsDash</span>
    
    <button class="block md:hidden text-2xl" onclick="document.getElementById('nav-menu').classList.toggle('open')">☰</button>
    
    <ul id="nav-menu" class="hidden md:flex gap-1 list-none">
      <li><a href="index.html" class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800">🏠 Home</a></li>
      <li><a href="matches.html" class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800">⚽ Matches</a></li>
      <li><a href="table.html" class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800">📊 Table</a></li>
      <li><a href="stats.html" class="px-4 py-2 rounded-lg bg-blue-500 text-white font-medium">🏆 Stats</a></li>
    </ul>
  </nav>

  <!-- ========================================== -->
  <!-- Main Page Content                          -->
  <!-- ========================================== -->
  <div class="max-w-[1440px] mx-auto p-4 md:p-8">

    <!-- Page Title -->
    <h1 class="text-2xl font-bold mb-1 flex items-center gap-2">
      <span class="section-dot"></span>
      <span id="page-title">Player Statistics</span>
    </h1>
    <p class="text-slate-400 text-sm mb-6">Top scorers, yellow cards, and red cards for the current season.</p>

    <!-- League Tabs (Filled by JavaScript) -->
    <div class="flex gap-2 flex-wrap mb-6" id="league-tabs"></div>

    <!-- Stat Toggle Buttons (Goals / Yellow / Red) -->
    <div class="flex gap-2 mb-6" id="stat-tabs">
      <button class="stat-btn active" data-stat="goals" style="--btn-color: #3b82f6;">⚽ Top Scorers</button>
      <button class="stat-btn" data-stat="yellow_cards" style="--btn-color: #f59e0b;">🟨 Yellow</button>
      <button class="stat-btn" data-stat="red_cards" style="--btn-color: #ef4444;">🟥 Red</button>
    </div>

    <!-- Loading Spinner -->
    <div id="spinner" class="spinner"></div>

    <!-- Player Cards Grid (Filled by JavaScript) -->
    <div id="players-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      <!-- JavaScript will inject .player-card elements here -->
    </div>
    
  </div>

  <script src="assets/js/config.js"></script>
  <script src="assets/js/stats.js"></script>
</body>
</html>
