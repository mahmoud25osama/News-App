<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
      content="Player Statistics — Top scorers, yellow cards, and red cards across Europe's top leagues." />
    <title>News Dashboard — Stats</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="bg-slate-900 text-slate-100 min-h-screen">

    <nav
      class="sticky top-0 z-50 flex items-center justify-between h-16 px-4 md:px-8 bg-slate-900/85 backdrop-blur-2xl border-b border-slate-600/40">
      <span class="text-xl font-extrabold text-blue-400"><i class="fa-regular fa-newspaper"></i> NewsDash</span>

      <button class="block md:hidden text-2xl"
        onclick="document.getElementById('nav-menu').classList.toggle('open')">☰</button>

      <ul id="nav-menu" class="hidden md:flex gap-1 list-none">
        <li><a href="index.html"
            class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800"><i
              class="fa-solid fa-house"></i> Home</a></li>
        <li><a href="matches.html"
            class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800"><i
              class="fa-solid fa-futbol"></i> Matches</a></li>
        <li><a href="table.html"
            class="px-4 py-2 rounded-lg text-slate-400 font-medium hover:text-white hover:bg-slate-800"><i
              class="fa-solid fa-table"></i> Table</a></li>
        <li><a href="stats.html" class="px-4 py-2 rounded-lg bg-blue-500 text-white font-medium"><i
              class="fa-solid fa-trophy"></i> Stats</a></li>
      </ul>
    </nav>

    <div class="max-w-[1440px] mx-auto p-4 md:p-8">

      <h1 class="text-2xl font-bold mb-1 flex items-center gap-2">
        <span class="w-2 h-2 bg-blue-500 rounded-full inline-block"></span>
        <span id="page-title">Player Statistics</span>
      </h1>
      <p class="text-slate-400 text-sm mb-6">Top scorers, yellow cards, and red cards for the current season.</p>

      <div class="flex gap-2 flex-wrap mb-6" id="league-tabs"></div>

      <div class="flex gap-2 mb-6 max-sm:flex-col" id="stat-tabs">
        <button
          class="stat-btn active flex items-center justify-center gap-2 px-5 py-2 border rounded-lg text-sm font-semibold cursor-pointer transition-all hover:border-blue-500 hover:text-slate-100 bg-[var(--btn-color)] border-[var(--btn-color)] text-white shadow-lg"
          data-stat="goals" style="--btn-color: #3b82f6;"><i class="fa-solid fa-futbol text-white"></i> Top
          Scorers</button>
        <button
          class="stat-btn flex items-center justify-center gap-2 px-5 py-2 border rounded-lg text-sm font-semibold cursor-pointer transition-all hover:border-blue-500 hover:text-slate-100 bg-slate-800 border-slate-600/40 text-slate-400"
          data-stat="yellow_cards" style="--btn-color: #f59e0b;"><i class="fa-solid fa-square"
            style="color: #f59e0b;"></i> Yellow</button>
        <button
          class="stat-btn flex items-center justify-center gap-2 px-5 py-2 border rounded-lg text-sm font-semibold cursor-pointer transition-all hover:border-blue-500 hover:text-slate-100 bg-slate-800 border-slate-600/40 text-slate-400"
          data-stat="red_cards" style="--btn-color: #ef4444;"><i class="fa-solid fa-square" style="color: #ef4444;"></i>
          Red</button>
      </div>

      <div id="spinner"
        class="w-10 h-10 border-[3px] border-slate-600 border-t-blue-500 rounded-full animate-spin mx-auto my-8"></div>

      <div id="players-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
      </div>

    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/stats.js"></script>
  </body>

</html>
