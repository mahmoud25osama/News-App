<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Player Statistics — Top scorers, yellow cards, and red cards across Europe's top leagues." />
    <title>News Dashboard — Stats</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: { extend: { fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] } } }
      }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body class="bg-gray-50 text-gray-900 min-h-screen font-sans">

    <nav class="sticky top-0 z-50 flex items-center justify-between h-16 px-4 md:px-8 bg-white border-b border-gray-200 shadow-sm">
      <span class="text-xl font-extrabold text-blue-600">
        <i class="fa-regular fa-newspaper"></i> NewsDash
      </span>

      <button class="block md:hidden text-2xl text-gray-600" onclick="document.getElementById('nav-menu').classList.toggle('hidden')">
        ☰
      </button>

      <ul id="nav-menu" class="hidden md:flex gap-2 list-none m-0 p-0 items-center">
        <li>
          <a href="index.html" class="block px-4 py-2 rounded text-gray-600 font-medium hover:text-blue-600 hover:bg-blue-50 transition border border-transparent">
            <i class="fa-solid fa-house"></i> Home
          </a>
        </li>
        <li>
          <a href="matches.html" class="block px-4 py-2 rounded text-gray-600 font-medium hover:text-blue-600 hover:bg-blue-50 transition border border-transparent">
            <i class="fa-solid fa-futbol"></i> Matches
          </a>
        </li>
        <li>
          <a href="table.html" class="block px-4 py-2 rounded text-gray-600 font-medium hover:text-blue-600 hover:bg-blue-50 transition border border-transparent">
            <i class="fa-solid fa-table"></i> Table
          </a>
        </li>
        <li>

          <a href="stats.html" class="block px-4 py-2 rounded border border-transparent bg-blue-600 text-white font-medium hover:bg-blue-700 transition">
            <i class="fa-solid fa-trophy"></i> Stats
          </a>
        </li>
      </ul>
    </nav>

    <div class="max-w-[1440px] mx-auto p-4 md:p-8 mt-2">

      <h1 class="text-2xl font-bold mb-1 flex items-center gap-2 text-gray-800">
        <span class="w-3 h-3 bg-blue-600 rounded-full inline-block"></span>
        <span id="page-title">Player Statistics</span>
      </h1>
      <p class="text-gray-500 text-sm mb-6">Top scorers, yellow cards, and red cards for the current season.</p>

      <div class="flex gap-2 flex-wrap mb-6" id="league-tabs"></div>

      <div class="flex gap-2 mb-6 max-sm:flex-col" id="stat-tabs">

        <button class="stat-btn active flex items-center justify-center gap-2 px-5 py-2 border rounded text-sm font-semibold cursor-pointer transition bg-blue-600 border-blue-600 text-white hover:bg-blue-700" data-stat="goals">
          <i class="fa-solid fa-futbol text-white"></i> Top Scorers
        </button>

        <button class="stat-btn flex items-center justify-center gap-2 px-5 py-2 border rounded text-sm font-semibold cursor-pointer transition hover:border-blue-400 hover:text-blue-600 bg-white border-gray-300 text-gray-600 hover:bg-gray-50" data-stat="yellow_cards">
          <i class="fa-solid fa-square text-yellow-500"></i> Yellow Cards
        </button>

        <button class="stat-btn flex items-center justify-center gap-2 px-5 py-2 border rounded text-sm font-semibold cursor-pointer transition hover:border-blue-400 hover:text-blue-600 bg-white border-gray-300 text-gray-600 hover:bg-gray-50" data-stat="red_cards">
          <i class="fa-solid fa-square text-red-500"></i> Red Cards
        </button>
      </div>

      <div id="spinner" class="w-10 h-10 border-4 border-gray-200 border-t-blue-600 rounded-full animate-spin mx-auto my-8"></div>

      <div id="players-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4"></div>

    </div>

    <script src="assets/js/config.js"></script>
    <script src="assets/js/stats.js"></script>

  </body>
</html>
